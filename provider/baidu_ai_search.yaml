credentials_for_provider:
  api_key:
    type: secret-input
    required: true
    label:
      en_US: API Key
      zh_Hans: API Key
    placeholder:
      en_US: Enter your Baidu AI Search API Key
      zh_Hans: 输入您的百度 AI 搜索 API Key
