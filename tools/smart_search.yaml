identity:
  name: smart_search
  author: zimingzhu
  label:
    en_US: Smart Search
    zh_Hans: 智能搜索
description:
  human:
    en_US: Search and summarize web information with citations.
    zh_Hans: 调用百度 AI Search 做搜索与总结，并返回引用来源。
  llm: Search the web, summarize the result in markdown, and keep citations.
parameters:
  - name: query
    type: string
    required: true
    label:
      en_US: Query
      zh_Hans: 查询内容
    human_description:
      en_US: Natural language search query.
      zh_Hans: 请输入要搜索的自然语言查询。
    llm_description: Search query used to retrieve and summarize relevant web information.
    form: llm
  - name: top_k
    type: number
    required: false
    default: 5
    label:
      en_US: Top K
      zh_Hans: 返回条数
    human_description:
      en_US: Number of web results to keep, between 1 and 10.
      zh_Hans: 保留的网页结果数量，范围 1 到 10。
    llm_description: Number of web results to keep for building the summary and citations.
    form: llm
extra:
  python:
    source: tools/smart_search.py
